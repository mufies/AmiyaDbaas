services:
  postgres:
    image: postgres:16
    container_name: amiya_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: amiya_db
    ports:
      - "5432:5432"
    volumes:
      - amiya_pgdata:/var/lib/postgresql/data

volumes:
  amiya_pgdata:
    driver: local
